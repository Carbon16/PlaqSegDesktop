name: 'Generate macOS CSR'

on:
  workflow_dispatch:

jobs:
  generate-csr:
    runs-on: macos-latest
    steps:
      - name: Generate private key and CSR
        run: |
          openssl req -new -newkey rsa:2048 -nodes \
            -keyout developer_id.key \
            -out developer_id.csr \
            -subj "/emailAddress=lgs1g24@soton.ac.uk/CN=PlaqSeg Desktop Developer ID/O=Phage Collection Project/C=GB"
          echo "✅ CSR generated successfully"
          openssl req -in developer_id.csr -noout -subject

      - name: Upload CSR
        uses: actions/upload-artifact@v4
        with:
          name: developer-id-csr
          path: developer_id.csr
          retention-days: 7

      - name: Upload Private Key
        uses: actions/upload-artifact@v4
        with:
          name: developer-id-private-key
          path: developer_id.key
          retention-days: 1
